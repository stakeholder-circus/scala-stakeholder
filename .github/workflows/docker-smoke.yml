name: docker-smoke

on:
  push:
  pull_request:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t scala-stakeholder .
      - run: docker run --rm scala-stakeholder --list-values
      - run: docker run --rm scala-stakeholder --output-format json --focus-family code_analyzer --seed 123
      - run: docker run --rm scala-stakeholder --output-format json --focus-family platform_engineering --seed 123
      - run: |
          set +e
          docker run --rm scala-stakeholder --experimental-provider local-demo
          rc=$?
          set -e
          test "$rc" -eq 2
